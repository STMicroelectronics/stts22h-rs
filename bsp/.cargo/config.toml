# Examples can be run using aliases:
#
# Example: cargo nucleo-f401re-embassy --features <example_name>
#
# Configuration is required for unsupported boards.

[build]
# -- TARGET + RUNNER (must match chosen board) --------------------------------
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32F401RETx --connect-under-reset"

# -- BOARD (uncomment one or use alias) --------------------------------------
# features = "nucleo-f401re-embassy"
# features = "nucleo-f401re"

# -- EXAMPLE (uncomment one) -------------------------------------------------
# Add --features flag after aliases

# -- CONVENIENCE ALIASES --------------------------------------------------
# Usage: cargo nucleo-f401re-embassy  (runs whichever example is selected above)
[alias]
nucleo-f401re-embassy = "run --target thumbv7em-none-eabihf --features nucleo-f401re-embassy"
nucleo-f401re         = "run --target thumbv7em-none-eabihf --features nucleo-f401re"

[env]
DEFMT_LOG = "info"
